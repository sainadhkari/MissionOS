# Production stack: postgres + backend + frontend, all containerized.
# The dev-only docker-compose.yml (postgres + pgAdmin, app runs on the host)
# is untouched — this is a separate, standalone file for a fully
# containerized deployment, not an override of it.
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file backend/.env up -d --build

networks:
  missionos-network:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads:

services:
  postgres:
    image: postgres:17
    container_name: missionos-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-missionos}
      POSTGRES_USER: ${POSTGRES_USER:-missionos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - missionos-network
    # Deliberately no `ports:` — only `backend` needs to reach Postgres, over
    # the internal network. Not exposed to the host at all in production.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-missionos} -d ${POSTGRES_DB:-missionos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: missionos-backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - missionos-network
    volumes:
      - backend_uploads:/app/storage/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL must be set}
    container_name: missionos-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - missionos-network
