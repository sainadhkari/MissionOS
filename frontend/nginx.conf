server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing: any path not matching a real file falls back to
    # index.html so React Router (not nginx) decides what to render.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite fingerprints these filenames on every build, so they're safe to
    # cache aggressively — a new deploy always gets new filenames.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ...but index.html itself must never be cached, or clients keep loading
    # a stale build that references assets that no longer exist.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
