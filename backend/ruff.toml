target-version = "py314"
line-length = 100

[lint]
select = ["E", "W", "F", "I", "UP", "B"]
# B008: FastAPI's `Depends()`/`Security()` default-argument pattern is the framework's
# intended dependency-injection mechanism, not the mutable-default-argument bug this
# rule targets — every route handler using DI trips it.
ignore = ["B008"]

[lint.isort]
known-first-party = ["app"]
